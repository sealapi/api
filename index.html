<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>the seal api</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      font-family: 'Nunito', sans-serif;
    }
    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 2rem 1rem;
    }
    .title {
      font-size: 30px;
      font-weight: 600;
      color: #fff;
      text-align: center;
      letter-spacing: -0.3px;
      opacity: 0;
      transform: translateY(-18px);
      animation: fadeDown 0.7s ease 0.1s forwards;
    }
    .sub {
      font-size: 13px;
      font-weight: 300;
      color: #888;
      margin-top: 5px;
      text-align: center;
      letter-spacing: 0.08em;
      opacity: 0;
      transform: translateY(-10px);
      animation: fadeDown 0.7s ease 0.3s forwards;
    }
    .frame {
      width: 100%;
      max-width: 480px;
      aspect-ratio: 4/3;
      border-radius: 12px;
      border: 0.5px solid #333;
      overflow: hidden;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      opacity: 0;
      transform: scale(0.95) translateY(12px);
      animation: frameIn 0.8s cubic-bezier(0.22,1,0.36,1) 0.5s forwards;
    }
    .frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.5s ease;
    }
    .spinner {
      position: absolute;
      width: 32px;
      height: 32px;
      border: 2px solid #333;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .caption {
      font-size: 12px;
      font-weight: 300;
      color: #888;
      min-height: 16px;
      text-align: center;
      letter-spacing: 0.06em;
      opacity: 0;
      animation: fadeUp 0.6s ease 1s forwards;
    }
    .btn {
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      background: #111;
      border: 0.5px solid #444;
      border-radius: 8px;
      padding: 10px 28px;
      cursor: pointer;
      letter-spacing: 0.03em;
      opacity: 0;
      animation: fadeUp 0.6s ease 1.1s forwards;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:hover { background: #222; }
    .btn:active { transform: scale(0.97); }
    @keyframes fadeDown { to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp   { to { opacity: 1; transform: translateY(0); } }
    @keyframes frameIn  { to { opacity: 1; transform: scale(1) translateY(0); } }
    @keyframes spin     { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="app">
    <div>
      <div class="title">the seal api</div>
      <div class="sub">random seal images on demand</div>
    </div>
    <div class="frame">
      <div class="spinner" id="spinner"></div>
      <img id="img" alt="a seal" style="opacity:0" />
    </div>
    <div class="caption" id="cap"></div>
    <button class="btn" onclick="loadSeal()">new seal ↺</button>
  </div>

  <script>
    const categories = [
      "Phoca_vitulina",
      "Halichoerus_grypus",
      "Mirounga",
      "Hydrurga_leptonyx",
      "Pagophilus_groenlandicus",
      "Leptonychotes_weddellii",
      "Callorhinus_ursinus",
      "Pusa_hispida",
    ];
    const names = [
      "harbour seal","grey seal","elephant seal","leopard seal",
      "harp seal","weddell seal","northern fur seal","ringed seal"
    ];
    let lastIdx = -1;

    async function fetchPool(category) {
      const url = `https://commons.wikimedia.org/w/api.php?action=query&list=categorymembers&cmtitle=Category:${category}&cmtype=file&cmlimit=30&cmnamespace=6&format=json&origin=*`;
      const res = await fetch(url);
      const data = await res.json();
      return (data.query?.categorymembers || [])
        .map(f => f.title)
        .filter(t => /\.(jpg|jpeg|png)$/i.test(t));
    }

    async function getImageUrl(title) {
      const url = `https://commons.wikimedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=imageinfo&iiprop=url&iiurlwidth=800&format=json&origin=*`;
      const res = await fetch(url);
      const data = await res.json();
      const pages = data.query?.pages || {};
      const page = Object.values(pages)[0];
      return page?.imageinfo?.[0]?.thumburl || null;
    }

    async function loadSeal() {
      const img = document.getElementById('img');
      const cap = document.getElementById('cap');
      const spinner = document.getElementById('spinner');

      img.style.opacity = 0;
      spinner.style.display = 'block';
      cap.textContent = 'fetching seal...';

      let idx;
      do { idx = Math.floor(Math.random() * categories.length); }
      while (idx === lastIdx && categories.length > 1);
      lastIdx = idx;

      try {
        const files = await fetchPool(categories[idx]);
        if (!files.length) throw new Error('no files');
        const file = files[Math.floor(Math.random() * files.length)];
        const imageUrl = await getImageUrl(file);
        if (!imageUrl) throw new Error('no url');

        const t = new Image();
        t.onload = () => {
          img.src = t.src;
          img.style.opacity = 1;
          spinner.style.display = 'none';
          cap.textContent = names[idx];
        };
        t.onerror = () => {
          spinner.style.display = 'none';
          cap.textContent = 'seal escaped — try again';
        };
        t.src = imageUrl;
      } catch (e) {
        spinner.style.display = 'none';
        cap.textContent = 'seal escaped — try again';
      }
    }

    loadSeal();
  </script>
</body>
</html>
